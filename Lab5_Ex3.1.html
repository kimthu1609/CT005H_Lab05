<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Infographic và Video</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f9f9f9;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    img {
      max-width: 100%;
      height: auto;
      margin-bottom: 20px;
      border: 2px solid #ccc;
      border-radius: 8px;
    }
    iframe {
      width: 100%;
      height: 450px;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Giới thiệu cá nhân</h1>
    <p><strong>Họ tên:</strong> Nguyễn Văn A</p>
    <p><strong>MSSV:</strong> 12345678</p>
    <p><strong>Lớp:</strong> CT005H</p>
    <hr>
    <h2>Các sản phẩm đã tạo</h2>
    <h3>1. File PDF</h3>
    <embed src="SanPham1.pdf" type="application/pdf" width="100%" height="500px" />
    <h3>2. Hình ảnh PNG</h3>
    <img src="Lab05_Ex2.1.png.png" alt="Infographic về lợi ích công nghệ số trong giáo dục">
    <h3>3. Video YouTube</h3>
    <iframe 
      src="https://www.youtube.com/embed/sKE41Yl2LNY" 
      title="YouTube video player" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
