<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Infographic và Video</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f9f9f9;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    img {
      max-width: 100%;
      height: auto;
      margin-bottom: 20px;
      border: 2px solid #ccc;
      border-radius: 8px;
    }
    iframe {
      width: 100%;
      height: 450px;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Infographic và Video YouTube</h1>
    
    <!-- Hiển thị infographic -->
    <img src="Lab05_Ex2.1.png.png" alt="Infographic về lợi ích công nghệ số trong giáo dục">
    
    <!-- Hiển thị video YouTube -->
    <iframe 
      src="https://www.youtube.com/embed/sKE41Yl2LNY" 
      title="YouTube video player" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
